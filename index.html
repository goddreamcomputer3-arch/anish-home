<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Control By Anish</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Device Control</h1>
                <p class="subtitle">By Anish</p>
                <div id="statusBadge" class="status-badge offline">Offline</div>
            </header>

            <div id="authBox" class="auth-container">
                <input id="emailField" type="email" placeholder="Email Address">
                <input id="passwordField" type="password" placeholder="Password">
                <button id="loginBtn" class="main-btn">Login</button>
            </div>

            <div id="controlBox" class="control-grid" style="display:none;">
                
                <div class="control-item">
                    <div class="device-title">💡 Main LED</div>
                    <label class="switch">
                        <input type="checkbox" id="toggle2">
                        <span class="slider"></span>
                    </label>
                    <p id="status2" class="status-text">OFF</p>
                </div>

                <div class="control-item">
                    <div class="device-title">🔌 Device 1</div>
                    <label class="switch">
                        <input type="checkbox" id="toggle21">
                        <span class="slider"></span>
                    </label>
                    <p id="status21" class="status-text">OFF</p>
                </div>

                <div class="control-item">
                    <div class="device-title">⚙️ Device 2</div>
                    <label class="switch">
                        <input type="checkbox" id="toggle22">
                        <span class="slider"></span>
                    </label>
                    <p id="status22" class="status-text">OFF</p>
                </div>

                <button id="logoutBtn" class="logout-link">Logout</button>
            </div>
        </div>
    </div>
</body>
</html>
