<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Control By Anish</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="glass-card">
            <header>
                <h1>Device Control</h1>
                <p class="subtitle">By Anish</p>
                <div id="statusBadge" class="status-badge offline">System Offline</div>
            </header>

            <div id="authBox" class="auth-container">
                <div class="input-group">
                    <input id="emailField" type="email" placeholder="Email Address">
                </div>
                <div class="input-group">
                    <input id="passwordField" type="password" placeholder="Password">
                </div>
                <button id="loginBtn" class="main-btn">Access System</button>
            </div>

            <div id="controlBox" class="control-grid" style="display:none;">
                <div class="control-item">
                    <button id="btn2" class="power-btn">
                        <span class="icon">💡</span>
                        <span class="label">Main LED</span>
                    </button>
                    <p id="status2" class="status-text">OFF</p>
                </div>

                <div class="control-item">
                    <button id="btn21" class="power-btn">
                        <span class="icon">💡</span>
                        <span class="label">Device 1</span>
                    </button>
                    <p id="status21" class="status-text">OFF</p>
                </div>

                <div class="control-item">
                    <button id="btn22" class="power-btn">
                        <span class="icon">⚙️</span>
                        <span class="label">Device 2</span>
                    </button>
                    <p id="status22" class="status-text">OFF</p>
                </div>

                <button id="logoutBtn" class="logout-link">Disconnect System</button>
            </div>
        </div>
    </div>
</body>
</html>
